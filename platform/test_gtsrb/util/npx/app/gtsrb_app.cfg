[preprocess]
input=gtsrb_opendataset
timesteps=4
step_generation=direct

[train]
epoch=30
kfold=5
repeat=1

[global]
input_size=32,32
input_channels=3
output_classes=43
neuron_type=q8ssi

[Conv2d] # 3x32x32 -> 6x28x28
in_channels=3
out_channels=6
kernel_size=5
stride=1
padding=0

[MaxPool2d] # 6x14x14
kernel_size=2
padding=0

[Leaky]
beta=1.0
reset_mechanism=subtract
learn_threshold=False

[Conv2d] # 6x14x14 -> 16x10x10
in_channels=6
out_channels=16
kernel_size=5
stride=1
padding=0

[MaxPool2d] # 16x10x10 -> 16x5x5
kernel_size=2
padding=0

[Leaky]
beta=1.0
reset_mechanism=subtract
learn_threshold=False

[Flatten]

[Linear]
in_features=400
out_features=120

[Leaky]
beta=1.0
reset_mechanism=subtract
learn_threshold=False

[Linear]
in_features=120
out_features=84

[Leaky]
beta=1.0
reset_mechanism=subtract
learn_threshold=False

[Linear]
in_features=84
out_features=43

[Leaky]
beta=1.0
reset_mechanism=subtract
learn_threshold=False
